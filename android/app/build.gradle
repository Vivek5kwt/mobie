apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

// Task to fix React Native autogenerated file after it's generated
task fixReactNativeEntryPoint {
    doLast {
        def entryPointFile = file("build/generated/autolinking/src/main/java/com/facebook/react/ReactNativeApplicationEntryPoint.java")
        if (entryPointFile.exists()) {
            def packageName = android.namespace
            def content = entryPointFile.text
            def originalContent = content
            
            // Replace old package name references (including dynamic builder IDs) with current namespace
            content = content.replaceAll(/com\.mobidrag(?:\.builder\.app\d+)?\.BuildConfig/, "${packageName}.BuildConfig")
            
            if (content != originalContent) {
                entryPointFile.text = content
                println "✅ Fixed ReactNativeApplicationEntryPoint.java with package: ${packageName}"
            }
        }
    }
}

// Run fix task after autolinking generates the file
tasks.whenTaskAdded { task ->
    if (task.name == "generateAutolinkingNewArchitectureFiles") {
        task.finalizedBy fixReactNativeEntryPoint
    }
}

def appIdentityFile = file("../../config/appIdentity.json")
def appIdentity = [:]
if (appIdentityFile.exists()) {
    try {
        appIdentity = new groovy.json.JsonSlurper().parseText(appIdentityFile.text) ?: [:]
    } catch (Exception e) {
        println "Warning: Could not parse config/appIdentity.json: ${e.message}"
    }
}
def defaultAppId = appIdentity.appId ? appIdentity.appId.toString() : "187"

def appIdForBrandAssets = providers.environmentVariable("APP_ID")
    .orElse(providers.environmentVariable("REACT_APP_APP_ID"))
    .orElse(defaultAppId)

tasks.register("updateDynamicAppIcon", Exec) {
    workingDir rootProject.projectDir.parentFile
    commandLine "node", "scripts/update-app-icon.js"
    environment "APP_ID", appIdForBrandAssets.get()
}

tasks.register("syncAppIdentity", Exec) {
    workingDir rootProject.projectDir.parentFile
    commandLine "node", "scripts/sync-app-identity.js"
    environment "APP_ID", appIdForBrandAssets.get()
    environment "REACT_APP_APP_ID", appIdForBrandAssets.get()
}

updateDynamicAppIcon.dependsOn("syncAppIdentity")
preBuild.dependsOn("syncAppIdentity", "updateDynamicAppIcon")

/**
 * Hermes Enable (Required for React Native 0.82 + Reanimated 4)
 */
project.ext.react = [
    enableHermes: true
]
def hermesEnabled = project.ext.react.get("enableHermes", true)
/**
 * This is the configuration block to customize your React Native Android app.
 */
react {
    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * JSC fallback (not used because Hermes is enabled)
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    // Namespace / applicationId aligned with current app instance (com.mobidrag)
    // This must match MainActivity/MainApplication packages and (optionally) google-services.json
    namespace "com.mobidrag"

    defaultConfig {
        // ApplicationId aligned with namespace for this build
        applicationId "com.mobidrag"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        
        // React Native component name must stay aligned with AppRegistry/app.json "name".
        // The visible installed app label is controlled separately by strings.xml/displayName.
        def appJsonFile = file("../../app.json")
        def appName = appIdentity.name ?: "MobiDrag"
        if (appJsonFile.exists()) {
            try {
                def appJsonText = appJsonFile.text
                // Simple JSON parsing to extract "name" field
                def nameMatch = appJsonText =~ /"name"\s*:\s*"([^"]+)"/
                if (nameMatch && appName == "MobiDrag") {
                    appName = nameMatch[0][1]
                }
            } catch (Exception e) {
                println "Warning: Could not parse app.json, using default app name: ${e.message}"
            }
        }
        buildConfigField "String", "APP_NAME", "\"${appName}\""
        println "BuildConfig.APP_NAME will be set to: ${appName}"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Apply Google Services plugin for Firebase.
// google-services.json package_name is updated by scripts/update-android-package.js
// before the Gradle build runs, so it always matches the dynamic applicationId.
apply plugin: 'com.google.gms.google-services'
