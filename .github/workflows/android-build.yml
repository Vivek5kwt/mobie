name: Build Android APK

# Dynamic run name based on app name from mutation response
# Shows app name instead of "android_build" in GitHub Actions UI
run-name: ${{ github.event.client_payload.app_name || 'Android Build' }}

permissions:
  contents: write
 
on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "App ID"
        required: true
  repository_dispatch:
    types: [android_build]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    env:
      APP_ID: ${{ github.event.client_payload.app_id || github.event.inputs.app_id }}
      APP_NAME: ${{ github.event.client_payload.app_name || '' }}
      APP_LOGO: ${{ github.event.client_payload.app_logo || '' }}
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install dependencies
        run: npm install
 
      - name: Set App Name and Logo from Mutation
        id: set_app_info
        run: |
          echo "Building for APP_ID=${APP_ID}"
          # Use app_name from mutation response (triggerAndroidBuild)
          if [ -n "${{ env.APP_NAME }}" ]; then
            echo "✅ App Name from mutation: ${{ env.APP_NAME }}"
            echo "APP_NAME=${{ env.APP_NAME }}" >> $GITHUB_ENV
            # Update workflow run name to show app name (if supported by GitHub API)
            echo "::notice title=App Name::Building for app: ${{ env.APP_NAME }}"
          else
            echo "⚠️ No app name from mutation, will fetch or use default"
          fi
          if [ -n "${{ env.APP_LOGO }}" ]; then
            echo "✅ App Logo from mutation: ${{ env.APP_LOGO }}"
            echo "APP_LOGO=${{ env.APP_LOGO }}" >> $GITHUB_ENV
          fi

      - name: Fetch App Name and Icon (Fallback if not provided)
        env:
          APP_ID: ${{ env.APP_ID }}
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT || 'https://app.mobidrag.com/graphql' }}
          GRAPHQL_TOKEN: ${{ secrets.GRAPHQL_TOKEN }}
        run: |
          # Only fetch if app name was not provided from mutation
          if [ -z "${{ env.APP_NAME }}" ]; then
            echo "📡 Fetching app info from GraphQL as fallback..."
            node scripts/fetch-app-info.js || echo "⚠️ Failed to fetch app info"
            if [ -f app-info.json ]; then
              FALLBACK_NAME=$(node -p "require('./app-info.json').appName || ''")
              FALLBACK_ICON=$(node -p "require('./app-info.json').appIcon || ''")
              if [ -n "${FALLBACK_NAME}" ] && [ "${FALLBACK_NAME}" != "App-${APP_ID}" ]; then
                echo "APP_NAME=${FALLBACK_NAME}" >> $GITHUB_ENV
                echo "✅ Using fetched app name: ${FALLBACK_NAME}"
              else
                echo "APP_NAME=App-${APP_ID}" >> $GITHUB_ENV
                echo "⚠️ Using default app name: App-${APP_ID}"
              fi
              if [ -n "${FALLBACK_ICON}" ] && [ -z "${{ env.APP_LOGO }}" ]; then
                echo "APP_LOGO=${FALLBACK_ICON}" >> $GITHUB_ENV
                echo "✅ Using fetched app logo"
              fi
            else
              echo "APP_NAME=App-${APP_ID}" >> $GITHUB_ENV
              echo "⚠️ Using default app name: App-${APP_ID}"
            fi
          else
            echo "✅ Using app name from mutation: ${{ env.APP_NAME }}"
          fi

      - name: Generate Package Name
        id: package_name
        env:
          APP_ID: ${{ env.APP_ID }}
        run: |
          CUSTOM_PACKAGE="${{ github.event.client_payload.package_name }}"
          if [ -n "${CUSTOM_PACKAGE}" ]; then
            PACKAGE_NAME="${CUSTOM_PACKAGE}"
          else
            # Generate dynamically using APP_ID from GitHub trigger
            PACKAGE_NAME="com.mobidrag.app${APP_ID}"
          fi
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          echo "📦 Generated package name: ${PACKAGE_NAME}"

      - name: Fix Package Name (Auto-fix numeric segments)
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          if [ -n "${PACKAGE_NAME}" ]; then
            echo "🔧 Checking and fixing package name..."
            # Capture only the last line (package name) from script output
            FIXED_PACKAGE=$(node scripts/fix-package-name.js "${PACKAGE_NAME}" 2>&1 | tail -n 1)
            if [ "${FIXED_PACKAGE}" != "${PACKAGE_NAME}" ]; then
              echo "✅ Auto-fixed package name:"
              echo "   Original: ${PACKAGE_NAME}"
              echo "   Fixed:    ${FIXED_PACKAGE}"
              echo "PACKAGE_NAME=${FIXED_PACKAGE}" >> $GITHUB_ENV
            else
              echo "✅ Package name is already valid: ${PACKAGE_NAME}"
            fi
          fi

      - name: Validate Package Name
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          if [ -n "${PACKAGE_NAME}" ]; then
            echo "🔍 Validating package name..."
            node scripts/validate-package-name.js "${PACKAGE_NAME}" || exit 1
            echo "✅ Package name is valid: ${PACKAGE_NAME}"
          fi

      - name: Update Package Name and App Name
        env:
          APP_ID: ${{ env.APP_ID }}
          APP_NAME: ${{ env.APP_NAME }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          echo "📦 Updating package name and app name..."
          if [ -n "${APP_ID}" ]; then
            # Update Android package name and app name
            node scripts/update-android-package.js
            echo "✅ Package name and app name updated"
            echo "📱 Package: ${PACKAGE_NAME}"
            echo "📱 App Name: ${APP_NAME}"
            
            # Verify files were moved correctly
            OLD_PATH="android/app/src/main/java/com/mobidrag"
            NEW_PATH="android/app/src/main/java/$(echo ${PACKAGE_NAME} | tr '.' '/')"
            if [ -d "${OLD_PATH}" ]; then
              echo "⚠️ WARNING: Old package directory still exists: ${OLD_PATH}"
              echo "📋 Contents:"
              ls -la "${OLD_PATH}" || echo "Could not list contents"
            fi
            if [ -d "${NEW_PATH}" ]; then
              echo "✅ New package directory exists: ${NEW_PATH}"
              echo "📋 Contents:"
              ls -la "${NEW_PATH}" || echo "Could not list contents"
            else
              echo "⚠️ WARNING: New package directory not found: ${NEW_PATH}"
            fi
          else
            echo "⚠️ APP_ID not set, skipping package name update"
          fi

      - name: Update app.json
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_LOGO: ${{ env.APP_LOGO }}
          APP_ID: ${{ env.APP_ID }}
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            if (process.env.APP_NAME) {
              appJson.name = process.env.APP_NAME;
              appJson.displayName = process.env.APP_NAME;
            }
            if (process.env.APP_LOGO) {
              appJson.logo = process.env.APP_LOGO;
            }
            if (process.env.APP_ID) {
              appJson.appId = parseInt(process.env.APP_ID, 10) || null;
            }
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "
          if [ -n "${APP_NAME}" ]; then
            echo "✅ Updated app.json with app name: ${APP_NAME}"
          fi
          if [ -n "${APP_LOGO}" ]; then
            echo "✅ Updated app.json with app logo: ${APP_LOGO}"
          fi
          if [ -n "${APP_ID}" ]; then
            echo "✅ Updated app.json with app ID: ${APP_ID}"
          fi

      - name: Install ImageMagick for icon resizing
        if: env.APP_LOGO != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick || echo "⚠️ ImageMagick installation failed, will use fallback"

      - name: Download and Update App Icon
        env:
          APP_LOGO: ${{ env.APP_LOGO }}
        run: |
          if [ -n "${APP_LOGO}" ]; then
            echo "📥 Downloading app icon from: ${APP_LOGO}"
            node scripts/update-app-icon.js
            echo "✅ App icon update completed"
          else
            echo "⚠️ No app logo provided, skipping icon update"
          fi

      # ── Firebase Setup ─────────────────────────────────────────────────────
      # Runs AFTER package name is finalised and BEFORE the Android build.
      # Creates a Firebase Android app (or reuses an existing one) for the
      # current PACKAGE_NAME, downloads google-services.json, and injects it.

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Authenticate Firebase CLI
        run: |
          # ── Strategy: ONE account → SEPARATE project per app ──────────────
          # Each app gets its own Firebase project: mbdrag-{appId}
          # Credentials must be set in: Repo Settings → Secrets → Actions
          #
          # Option A (recommended): FIREBASE_TOKEN
          #   1. Run on your local machine:  npx firebase-tools login:ci
          #   2. Copy the printed token
          #   3. Add secret:  FIREBASE_TOKEN = <that token>
          #
          # Option B: FIREBASE_SERVICE_ACCOUNT
          #   1. Google Cloud Console → IAM → Service Accounts → Create
          #   2. Grant roles: Firebase Admin + Project Creator + Service Usage Admin
          #   3. Keys tab → Add Key → JSON → Download
          #   4. Add secret:  FIREBASE_SERVICE_ACCOUNT = <full JSON content>
          # ──────────────────────────────────────────────────────────────────

          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "🔑 Using Service Account credentials"
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> $GITHUB_ENV
            echo "FIREBASE_CREDENTIALS_SET=true"  >> $GITHUB_ENV
            echo "FIREBASE_AUTH_METHOD=service-account" >> $GITHUB_ENV
            echo "✅ Service account ready"

          elif [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "🔑 Using CI Token credentials"
            echo "FIREBASE_TOKEN=${{ secrets.FIREBASE_TOKEN }}" >> $GITHUB_ENV
            echo "FIREBASE_CREDENTIALS_SET=true"  >> $GITHUB_ENV
            echo "FIREBASE_AUTH_METHOD=ci-token"  >> $GITHUB_ENV
            echo "✅ CI token ready"

          else
            echo "FIREBASE_CREDENTIALS_SET=false" >> $GITHUB_ENV
            echo "FIREBASE_SETUP_STATUS=skipped"  >> $GITHUB_ENV
            echo "FIREBASE_SKIP_REASON=No Firebase secret set. See instructions in this step." >> $GITHUB_ENV
            echo ""
            echo "════════════════════════════════════════════════════"
            echo "  ⚠️  FIREBASE CREDENTIALS NOT SET"
            echo "════════════════════════════════════════════════════"
            echo "  Firebase will be SKIPPED for this build."
            echo "  All apps will share one google-services.json."
            echo ""
            echo "  TO ENABLE FIREBASE — add ONE of these secrets:"
            echo "  Repo → Settings → Secrets → Actions → New secret"
            echo ""
            echo "  ┌─ OPTION A (easier) ──────────────────────────┐"
            echo "  │  Secret name : FIREBASE_TOKEN                 │"
            echo "  │  How to get  : Run on your machine:           │"
            echo "  │    npx firebase-tools login:ci                │"
            echo "  │  Copy the token it prints and paste as value  │"
            echo "  └───────────────────────────────────────────────┘"
            echo ""
            echo "  ┌─ OPTION B (production) ───────────────────────┐"
            echo "  │  Secret name : FIREBASE_SERVICE_ACCOUNT        │"
            echo "  │  How to get  :                                  │"
            echo "  │    1. Google Cloud Console                      │"
            echo "  │    2. IAM & Admin → Service Accounts → Create  │"
            echo "  │    3. Grant roles:                              │"
            echo "  │       - Firebase Admin                         │"
            echo "  │       - Project Creator                        │"
            echo "  │       - Service Usage Admin                    │"
            echo "  │    4. Keys tab → Add Key → JSON → Download     │"
            echo "  │    5. Paste entire JSON as the secret value    │"
            echo "  └───────────────────────────────────────────────┘"
            echo "════════════════════════════════════════════════════"
            echo "::warning title=Firebase Skipped — Action Required::No Firebase secret found. Run 'npx firebase-tools login:ci' on your machine and add the output as FIREBASE_TOKEN secret. Each generated app will share one google-services.json until this is done."
          fi

      - name: Create Firebase Project + Register App + Inject Config
        env:
          APP_ID:           ${{ env.APP_ID }}
          APP_NAME:         ${{ env.APP_NAME }}
          PACKAGE_NAME:     ${{ env.PACKAGE_NAME }}
          GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT || 'https://app.mobidrag.com/graphql' }}
          GRAPHQL_TOKEN:    ${{ secrets.GRAPHQL_TOKEN }}
        run: |
          # Strategy: creates project mbdrag-{appId} in the Firebase account
          if [ "${FIREBASE_CREDENTIALS_SET}" = "true" ]; then
            echo "🔥 Creating Firebase project: mbdrag-${APP_ID}"
            node scripts/firebase-setup.js
          else
            echo "⏭️  Firebase setup skipped — no credentials (build continues with fallback config)"
          fi

      - name: Write FCM Topic (always runs)
        env:
          APP_ID:       ${{ env.APP_ID }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          # FCM topic is isolated per project — just record it
          FCM_TOPIC="app-${APP_ID}-notifications"
          echo "FCM_TOPIC=${FCM_TOPIC}" >> $GITHUB_ENV
          node scripts/firebase-notify.js
          echo "📬 FCM Topic: ${FCM_TOPIC}"

      # ── Firebase Status Report (always runs — tells you exactly what happened) ──
      - name: Firebase Status Report
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║              FIREBASE SETUP STATUS REPORT               ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  APP_ID       : ${APP_ID}"
          echo "║  Package      : ${PACKAGE_NAME}"
          echo "╠══════════════════════════════════════════════════════════╣"

          if [ "${FIREBASE_SETUP_STATUS}" = "success" ]; then
            echo "║  STATUS       : ✅ SUCCESS — Firebase fully configured"
            echo "║  Firebase ID  : ${FIREBASE_APP_ID}"
            echo "║  Project      : ${FIREBASE_PROJECT_ID}"
            echo "║  FCM Topic    : app-${APP_ID}-notifications"
            echo "║  Config file  : android/app/google-services.json ✅"
            echo "╠══════════════════════════════════════════════════════════╣"
            echo "║  ✅ Each generated app has its OWN Firebase config     ║"
            echo "║  ✅ Push notifications are ISOLATED per app            ║"

          elif [ "${FIREBASE_SETUP_STATUS}" = "skipped" ]; then
            echo "║  STATUS       : ⚠️  SKIPPED — Firebase NOT configured"
            echo "║  Reason       : ${FIREBASE_SKIP_REASON}"
            echo "║  Config file  : android/app/google-services.json (shared fallback)"
            echo "╠══════════════════════════════════════════════════════════╣"
            echo "║  ⚠️  All generated apps share ONE Firebase config      ║"
            echo "║  ⚠️  Push notifications will NOT be isolated per app   ║"
            echo "║                                                          ║"
            echo "║  TO FIX — Add these secrets in:                         ║"
            echo "║  GitHub → Repo Settings → Secrets → Actions             ║"
            echo "║    Secret 1: FIREBASE_SERVICE_ACCOUNT                   ║"
            echo "║              (contents of your service account JSON)    ║"
            echo "║    Secret 2: FIREBASE_PROJECT_ID                        ║"
            echo "║              (value: mobidrag-d2f5e)                    ║"

          elif [ "${FIREBASE_SETUP_STATUS}" = "failed" ]; then
            echo "║  STATUS       : ❌ FAILED — Error during setup"
            echo "║  Reason       : ${FIREBASE_SKIP_REASON}"
            echo "║  Config file  : android/app/google-services.json (shared fallback)"
            echo "╠══════════════════════════════════════════════════════════╣"
            echo "║  ❌ Firebase setup failed — check logs above            ║"
            echo "║  ⚠️  Build continued with fallback google-services.json ║"

          else
            echo "║  STATUS       : ⚠️  UNKNOWN — Status was not recorded"
          fi

          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

      # ── End Firebase Setup ─────────────────────────────────────────────────

      - name: Copy app.json to Android assets
        run: |
          # Ensure app.json exists and is up-to-date (create default if not)
          if [ ! -f app.json ]; then
            echo '{"name":"MobiDrag","displayName":"MobiDrag"}' > app.json
            echo "⚠️ Created default app.json"
          fi
          
          # Verify app.json has the correct app name
          CURRENT_NAME=$(node -p "require('./app.json').name || 'MobiDrag'")
          EXPECTED_NAME="${{ env.APP_NAME }}"
          if [ -n "${EXPECTED_NAME}" ] && [ "${CURRENT_NAME}" != "${EXPECTED_NAME}" ]; then
            echo "⚠️ app.json name (${CURRENT_NAME}) doesn't match expected (${EXPECTED_NAME}), updating..."
            node -e "
              const fs = require('fs');
              const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
              appJson.name = '${EXPECTED_NAME}';
              appJson.displayName = '${EXPECTED_NAME}';
              fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
            "
            echo "✅ Updated app.json with app name: ${EXPECTED_NAME}"
          fi
          
          mkdir -p android/app/src/main/assets
          cp app.json android/app/src/main/assets/app.json
          echo "✅ Copied app.json to Android assets"
          echo "📄 App name in app.json: $(node -p "require('./app.json').name")"
          
          # Verify the file was copied correctly
          if [ -f android/app/src/main/assets/app.json ]; then
            echo "✅ Verified: app.json exists in assets folder"
            echo "📄 Content: $(cat android/app/src/main/assets/app.json)"
          else
            echo "❌ ERROR: app.json was NOT copied to assets folder!"
            exit 1
          fi

      - name: Build React with App ID
        env:
          REACT_APP_APP_ID: ${{ env.APP_ID }}
        run: |
          echo "🔨 Building React app with REACT_APP_APP_ID=${REACT_APP_APP_ID}"
          echo "📱 This appId (${REACT_APP_APP_ID}) will be dynamically passed to GraphQL Layouts query"
          npm run build
 
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
 
      - name: Verify app.json before Android build
        run: |
          if [ ! -f app.json ]; then
            echo "❌ app.json not found!"
            exit 1
          fi
          APP_NAME_FROM_JSON=$(node -p "require('./app.json').name || 'MobiDrag'")
          echo "✅ App name in app.json: ${APP_NAME_FROM_JSON}"
          echo "📱 This will be used for BuildConfig.APP_NAME in Android build"

      - name: Build Android APK
        env:
          REACT_APP_APP_ID: ${{ env.APP_ID }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
          
      - name: Fix React Native Autogenerated File
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          if [ -n "${PACKAGE_NAME}" ]; then
            echo "🔧 Fixing ReactNativeApplicationEntryPoint.java with package: ${PACKAGE_NAME}"
            node scripts/fix-react-native-entry-point.js "${PACKAGE_NAME}"
          else
            echo "⚠️ PACKAGE_NAME not set, skipping fix"
          fi
          
      - name: Build Android APK (Final)
        env:
          REACT_APP_APP_ID: ${{ env.APP_ID }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare APK for release
        id: prepare_apk
        env:
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ -n "${APP_NAME}" ]; then
            # Use app name for APK filename (sanitize for filesystem)
            # Format: appname.apk (no build number, no app ID)
            SANITIZED_NAME=$(echo "${APP_NAME}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g')
            APK_NAME="${SANITIZED_NAME}.apk"
          else
            APK_NAME="app.apk"
          fi
          cp "$APK_PATH" "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ APK prepared: $APK_NAME"

      - name: Create GitHub release with APK
        env:
          GH_TOKEN: ${{ github.token }}
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          # Use app name from mutation response, fallback to "android-build" if not available
          if [ -n "${APP_NAME}" ] && [ "${APP_NAME}" != "App-${APP_ID}" ]; then
            # Use app name for release (sanitize for filesystem)
            SANITIZED_NAME=$(echo "${APP_NAME}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g')
            TAG_NAME="${SANITIZED_NAME}-${GITHUB_RUN_ID}"
            RELEASE_NAME="${APP_NAME} - Build ${GITHUB_RUN_NUMBER}"
            RELEASE_NOTES="Automated Android build for ${APP_NAME} (APP_ID=${APP_ID})"
          else
            # Fallback to default naming
            TAG_NAME="android-build-${GITHUB_RUN_ID}"
            RELEASE_NAME="Android build ${GITHUB_RUN_NUMBER}"
            RELEASE_NOTES="Automated Android build for APP_ID=${APP_ID}"
          fi

          echo "📦 Creating release: ${RELEASE_NAME}"
          echo "🏷️  Tag: ${TAG_NAME}"

          # Create release with APK as downloadable asset
          gh release create "$TAG_NAME" \
            "${{ steps.prepare_apk.outputs.apk_name }}" \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_NOTES" \
            --latest=false || echo "⚠️ Release may already exist, continuing..."
          
          # Get the asset download URL for users
          ASSET_URL=$(gh release view "$TAG_NAME" --json assets -q '.assets[0].browser_download_url' 2>/dev/null || echo "")
          if [ -z "$ASSET_URL" ]; then
            # If release exists, upload the APK as an asset
            gh release upload "$TAG_NAME" "${{ steps.prepare_apk.outputs.apk_name }}" --clobber 2>/dev/null || echo "⚠️ Could not upload APK"
            ASSET_URL=$(gh release view "$TAG_NAME" --json assets -q '.assets[0].browser_download_url' 2>/dev/null || echo "")
          fi
          {
            echo "## ✅ Android Build Complete"
            echo ""
            if [ -n "${APP_NAME}" ] && [ "${APP_NAME}" != "App-${APP_ID}" ]; then
              echo "**App:** ${APP_NAME}"
            fi
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| APK | [${{ steps.prepare_apk.outputs.apk_name }}]($ASSET_URL) |"
            echo "| APP_ID | ${APP_ID} |"
            echo "| Package | \`${PACKAGE_NAME}\` |"
            echo ""

            echo "## 🔥 Firebase Status"
            echo ""
            if [ "${FIREBASE_SETUP_STATUS}" = "success" ]; then
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Status | ✅ **Configured — per-app Firebase** |"
              echo "| Firebase App ID | \`${FIREBASE_APP_ID}\` |"
              echo "| Firebase Project | \`${FIREBASE_PROJECT_ID}\` |"
              echo "| FCM Topic | \`app-${APP_ID}-notifications\` |"
              echo "| google-services.json | ✅ Injected for \`${PACKAGE_NAME}\` |"
            elif [ "${FIREBASE_SETUP_STATUS}" = "skipped" ]; then
              echo "> ⚠️ **Firebase NOT configured — all apps share the same Firebase config**"
              echo ""
              echo "**Reason:** ${FIREBASE_SKIP_REASON}"
              echo ""
              echo "### How to fix"
              echo "Go to **Repo → Settings → Secrets and variables → Actions** and add:"
              echo ""
              echo "| Secret name | Value |"
              echo "|---|---|"
              echo "| \`FIREBASE_SERVICE_ACCOUNT\` | Full JSON content of your Firebase service account key |"
              echo "| \`FIREBASE_PROJECT_ID\` | \`mobidrag-d2f5e\` |"
            elif [ "${FIREBASE_SETUP_STATUS}" = "failed" ]; then
              echo "> ❌ **Firebase setup FAILED — using shared fallback config**"
              echo ""
              echo "**Reason:** ${FIREBASE_SKIP_REASON}"
              echo ""
              echo "Check the **Firebase Status Report** step logs above for details."
            else
              echo "> ⚠️ Firebase status unknown — check logs"
            fi

            echo ""
            echo "---"
            echo "Release: [${RELEASE_NAME}](https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME})"
          } >> "$GITHUB_STEP_SUMMARY"
